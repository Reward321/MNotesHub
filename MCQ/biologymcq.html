  font-family: 'Segoe UI', sans-serif;

}

h2 {
  text-align: center;
}
header {
  background: linear-gradient(135deg, #0066ff, #0044cc);
  color: white;
  text-align: center;
  padding: 25px;
  border-bottom-left-radius: 25px;
  border-bottom-right-radius: 25px;
}


/* Unit Card */
.unit {
  background: white;
  margin-bottom: 15px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);

}

}

}

}</style><script>const quizData = {
  Electrostatics: [
    {
      question: "SI unit of charge?",
      options: ["Volt", "Coulomb", "Ampere", "Ohm"],
      correct: 1
    },
    {
      question: "Like charges ___ each other.",
      options: ["Attract", "Repel", "Neutralize", "Disappear"],
      correct: 1
    },
    {
      question: "Electric field unit?",
      options: ["N/C", "Volt", "Tesla", "Watt"],
      correct: 0
    },
    {
      question: "Device to detect charge?",
      options: ["Galvanometer", "Electroscope", "Ammeter", "Voltmeter"],
      correct: 1
    },
    {
      question: "Charge of electron is?",
      options: ["+1.6×10⁻¹⁹ C", "-1.6×10⁻¹⁹ C", "0", "1 C"],
      correct: 1
    },
    {
      question: "Capacitance unit?",
      options: ["Henry", "Farad", "Tesla", "Weber"],
      correct: 1
    },
    {
      question: "Permittivity symbol?",
      options: ["μ", "ε0", "λ", "φ"],
      correct: 1
    },
    {
      question: "Electric potential unit?",
      options: ["Volt", "Joule", "Newton", "Watt"],
      correct: 0
    },
    {
      question: "Coulomb's law depends on?",
      options: ["Distance", "Mass", "Time", "Velocity"],
      correct: 0
    },
    {
      question: "Field around point charge is?",
      options: ["Circular", "Radial", "Linear", "Spiral"],
      correct: 1
    }
  ],

  ModernPhysics: [
    {
      question: "Photoelectric effect explained by?",
      options: ["Newton", "Bohr", "Einstein", "Planck"],
      correct: 2
    },
    {
      question: "Energy packet is called?",
      options: ["Electron", "Photon", "Proton", "Neutron"],
      correct: 1
    },
    {
      question: "E = mc² proposed by?",
      options: ["Einstein", "Tesla", "Bohr", "Rutherford"],
      correct: 0
    },
    {
      question: "Bohr model applies to?",
      options: ["Hydrogen", "Oxygen", "Carbon", "Helium"],
      correct: 0
    },
    {
      question: "Nuclear reactor uses?",
      options: ["Fusion", "Fission", "Evaporation", "Ionization"],
      correct: 1
    },
    {
      question: "Half-life symbol?",
      options: ["T½", "λ", "μ", "f"],
      correct: 0
    },
    {
      question: "Binding energy unit?",
      options: ["MeV", "Joule", "Watt", "Tesla"],
      correct: 0
    },
    {
      question: "Compton effect involves?",
      options: ["Electron scattering", "Photon scattering", "Sound waves", "Magnetic field"],
      correct: 1
    },
    {
      question: "Atomic mass unit?",
      options: ["amu", "kg", "g", "eV"],
      correct: 0
    },
    {
      question: "Radioactive decay law is?",
      options: ["Linear", "atete", "Exponential", "Quadratic"],
      correct: 2
    }
  ]
};

// You can add Optics & Magnetism same way (structure is identical)

const container = document.getElementById("quiz-container");

Object.keys(quizData).forEach(unit => {
  const unitDiv = document.createElement("div");
  unitDiv.className = "unit";

  const header = document.createElement("div");
  header.className = "unit-header";
  header.textContent = unit;

  const content = document.createElement("div");
  content.className = "unit-content";

  header.onclick = () => {
    content.style.display =
      content.style.display === "block" ? "none" : "block";
  };

  quizData[unit].forEach((q, index) => {
    const questionDiv = document.createElement("div");
    questionDiv.className = "question";

    const question = document.createElement("p");
    question.textContent = `${index + 1}. ${q.question}`;
    questionDiv.appendChild(question);

    q.options.forEach((option, i) => {
      const label = document.createElement("label");
      const radio = document.createElement("input");

      radio.type = "radio";
      radio.name = unit + index;
      radio.value = i;

      label.appendChild(radio);
      label.appendChild(document.createTextNode(option));
      questionDiv.appendChild(label);
      questionDiv.appendChild(document.createElement("br"));
    });

    content.appendChild(questionDiv);
  });

  const submitBtn = document.createElement("button");
  submitBtn.textContent = "Submit Test";

  const scoreDisplay = document.createElement("div");
  scoreDisplay.className = "score";

  submitBtn.onclick = () => {
    let score = 0;

    quizData[unit].forEach((q, index) => {
      const selected = document.querySelector(
        `input[name="${unit + index}"]:checked`
      );
      if (selected && parseInt(selected.value) === q.correct) {
        score++;
      }
    });

    scoreDisplay.textContent = `Score: ${score} / ${quizData[unit].length}`;
  };

  content.appendChild(submitBtn);
  content.appendChild(scoreDisplay);

  unitDiv.appendChild(header);
  unitDiv.appendChild(content);
  container.appendChild(unitDiv);
});</script>

  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #f5f7fb;
  padding-bottom: 70px;
}

/* Header */
.top-header {
  background: linear-gradient(135deg, #0066ff, #0044cc);
  color: white;
  text-align: center;
  padding: 25px;
  border-bottom-left-radius: 25px;
  border-bottom-right-radius: 25px;
}

/* Notes Container */
.notes-container {
  padding: 20px;
  display: grid;
  grid-template-columns: 1fr;
  gap: 15px;
}

/* Note Card */
.note-card {
  background: white;
  padding: 18px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.note-card h3 {
  font-size: 14px;
  width: 65%;
}

.download-btn {
  background: #0066ff;
  color: white;
  padding: 8px 14px;
  border-radius: 20px;
  text-decoration: none;
  font-size: 12px;
  transition: 0.3s;
}

.download-btn:hover {
  background: #0044cc;
}

/* Footer */
.footer {
  background: #111;
  color: white;
  text-align: center;
  padding: 25px;
  margin-top: 30px;
}

.social-links {
  margin: 10px 0;
}

.social-links a {
  color: #ccc;
  margin: 0 10px;
  text-decoration: none;
}

/* Bottom Navigation */
.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  box-shadow: 0 -3px 10px rgba(0,0,0,0.1);
}

.bottom-nav a {
  text-decoration: none;
  color: #555;
  font-size: 13px;
}

.bottom-nav a.active {
  color: #0066ff;
  font-weight: 600;
}
/* Search Box */
.search-box {
  padding: 15px 20px;
  text-align: center;
}

.search-box input {
  width: 100%;
  max-width: 400px;
  padding: 10px 15px;
  border-radius: 20px;
  border: 1px solid #ccc;
  outline: none;
  font-size: 14px;
}

.search-box input:focus {
  border-color: #0066ff;
}body{
font-family:Arial;
margin:0;
}

/* Menu button */

.menu-btn{
font-size:28px;
cursor:pointer;
padding:12px 15px;
}

/* Side navigation */

.side-nav{
height:100%;
width:0;
position:fixed;
top:0;
right:0;
background:#ffffff;
overflow-x:hidden;
transition:0.35s;
padding-top:60px;
box-shadow:-3px 0 15px rgba(0,0,0,0.15);
}

/* Logo */

.logo{
padding-left:25px;
color:#2e8b57;
}

/* Links */

.side-nav a{
display:block;
padding:14px 25px;
text-decoration:none;
font-size:18px;
color:#333;
border-bottom:1px solid #eee;
}

.side-nav a:hover{
background:#f5f5f5;
color:#2e8b57;
}

/* Close button */

.close-btn{
position:absolute;
top:15px;
right:20px;
font-size:26px;
cursor:pointer;
}

/* Button */

.join-btn{
margin:35px 25px;
padding:12px;

background:#2e8b57;

font-size:17px;

}

background:#256f47;

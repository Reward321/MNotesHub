</html><style>body {
  font-family: 'Segoe UI', sans-serif;
  background: #f2f6fc;
  padding: 20px;

}

h2 {
  text-align: center;
}
header {
  background: linear-gradient(135deg, #0066ff, #0044cc);
  color: white;
  text-align: center;
  padding: 25px;
  border-bottom-left-radius: 25px;
  border-bottom-right-radius: 25px;
}


/* Unit Card */
.unit {
  background: white;
  margin-bottom: 15px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
  overflow: hidden;
}

/* Foldable Header */
.unit-header {
  padding: 15px;
  background: linear-gradient(135deg,#007BFF,#0056b3);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* Hidden Content */
.unit-content {
  display: none;
  padding: 15px;
}

/* Question Block */
.question {
  margin-bottom: 15px;
  padding: 10px;
  background: #f8fbff;
  border-radius: 8px;
}

.options label {
  display: block;
  margin: 5px 0;
  cursor: pointer;
}

button {
  padding: 8px 15px;
  border: none;
  background: #007BFF;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #0056b3;
}

.score {
  margin-top: 10px;
  font-weight: bold;
}</style><script>const quizData = {
inorganicQuestions = [
  {
    q:"Which element has highest electronegativity?",
    options:["Oxygen","Fluorine","Chlorine","Nitrogen"],
    answer:1
  },
  {
    q:"Oxidation state of S in H2SO4?",
    options:["+2","+4","+6","-2"],
    answer:2
  },
  {
    q:"Gas that turns limewater milky?",
    options:["CO2","O2","H2","N2"],
    answer:0
  },
  {
    q:"Liquid metal at room temperature?",
    options:["Mercury","Sodium","Aluminium","Copper"],
    answer:0
  },
  {
    q:"Neutral pH value?",options:["1","7","10","14"],
    answer:1
  },
  {
    q:"NaCl bond type?",
    options:["Ionic","Covalent","Metallic","Hydrogen"],
    answer:0
  },
  {
    q:"Which is noble gas?",
    options:["Nitrogen","Neon","Oxygen","Hydrogen"],
    answer:1
  },
  {
    q:"Group 1 element?",
    options:["Sodium","Calcium","Aluminium","Zinc"],
    answer:0
  },
  {
    q:"Rusting requires?",
    options:["Oxygen and water","Nitrogen","Hydrogen","CO2"],
    answer:0
  },
  {
    q:"Hardest natural substance?",
    options:["Diamond","Graphite","Quartz","Coal"],
    answer:0
  }
],

organicQuestions = [
{
q:"Simplest organic compound?",
options:["Methane","Ethane","Propane","Butane"],
answer:0
},
{
q:"Functional group of alcohol?",
options:["–OH","–COOH","–CHO","–NH2"],
answer:0
},
{
q:"Ethene belongs to?",
options:["Alkane","Alkene","Alkyne","Alcohol"],
answer:1
},
{
q:"Benzene contains how many carbons?",
options:["6","4","5","8"],
answer:0
},
{
q:"Formula of ethanol?",
options:["C2H5OH","CH3OH","C2H6","C3H8"],
answer:0
},
{
q:"Organic chemistry studies?",
options:["Carbon compounds","Metals","Salts","Minerals"],
answer:0
},
{
q:"Alkane general formula?",
options:["CnH2n+2","CnH2n","CnH2n-2","CnHn"],
answer:0
},
{
q:"Ethanoic acid common name?",
options:["Vinegar","Alcohol","Sugar","Salt"],
answer:0
},
{
q:"Polymer of ethene?",
options:["Polyethylene","Nylon","Bakelite","PVC"],
answer:0
},
{
q:"Organic compounds mainly contain?",
options:["Carbon","Sodium","Iron","Calcium"],
answer:0
}
]
  }:
  
// You can add Optics & Magnetism same way (structure is identical)

const container = document.getElementById("quiz-container");

Object.keys(quizData).forEach(unit => {
  const unitDiv = document.createElement("div");
  unitDiv.className = "unit";

  const header = document.createElement("div");
  header.className = "unit-header";
  header.textContent = unit;

  const content = document.createElement("div");
  content.className = "unit-content";

  header.onclick = () => {
    content.style.display =
      content.style.display === "block" ? "none" : "block";
  };

  quizData[unit].forEach((q, index) => {
    const questionDiv = document.createElement("div");
    questionDiv.className = "question";

    const question = document.createElement("p");
    question.textContent = `${index + 1}. ${q.question}`;
    questionDiv.appendChild(question);

    q.options.forEach((option, i) => {
      const label = document.createElement("label");
      const radio = document.createElement("input");

      radio.type = "radio";
      radio.name = unit + index;
      radio.value = i;

      label.appendChild(radio);
      label.appendChild(document.createTextNode(option));
      questionDiv.appendChild(label);
      questionDiv.appendChild(document.createElement("br"));
    });

    content.appendChild(questionDiv);
  });

  const submitBtn = document.createElement("button");
  submitBtn.textContent = "Submit Test";

  const scoreDisplay = document.createElement("div");
  scoreDisplay.className = "score";

  submitBtn.onclick = () => {
    let score = 0;

    quizData[unit].forEach((q, index) => {
      const selected = document.querySelector(
        `input[name="${unit + index}"]:checked`
      );
      if (selected && parseInt(selected.value) === q.correct) {
        score++;
      }
    });

    scoreDisplay.textContent = `Score: ${score} / ${quizData[unit].length}`;
  };

  content.appendChild(submitBtn);
  content.appendChild(scoreDisplay);

  unitDiv.appendChild(header);
  unitDiv.appendChild(content);
  container.appendChild(unitDiv);
});</script>

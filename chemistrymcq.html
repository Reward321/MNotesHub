const container = document.getElementById("quiz-container");

Object.keys(quizData).forEach(unit => {
  const unitDiv = document.createElement("div");
  unitDiv.className = "unit";

  const header = document.createElement("div");
  header.className = "unit-header";
  header.textContent = unit;

  const content = document.createElement("div");
  content.className = "unit-content";

  header.onclick = () => {
    content.style.display =
      content.style.display === "block" ? "none" : "block";
  };

  quizData[unit].forEach((q, index) => {
    const questionDiv = document.createElement("div");
    questionDiv.className = "question";

    const question = document.createElement("p");
    question.textContent = `${index + 1}. ${q.question}`;
    questionDiv.appendChild(question);

    q.options.forEach((option, i) => {
      const label = document.createElement("label");
      const radio = document.createElement("input");

      radio.type = "radio";
      radio.name = unit + index;
      radio.value = i;

      label.appendChild(radio);
      label.appendChild(document.createTextNode(option));
      questionDiv.appendChild(label);
      questionDiv.appendChild(document.createElement("br"));
    });

    content.appendChild(questionDiv);
  });

  const submitBtn = document.createElement("button");
  submitBtn.textContent = "Submit Test";

  const scoreDisplay = document.createElement("div");
  scoreDisplay.className = "score";

submitBtn.onclick = () => {
  let score = 0;

  quizData[unit].forEach((q, index) => {
    const radios = document.querySelectorAll(`input[name="${unit + index}"]`);
    const selected = document.querySelector(`input[name="${unit + index}"]:checked`);

    radios.forEach((radio, i) => {
      const label = radio.parentElement;

      if (i === q.correct) {
        label.style.color = "green";
        label.style.fontWeight = "bold";
      }

      if (selected && parseInt(selected.value) === q.correct) {
        if (radio.checked) {
          label.style.color = "green";
        }
      } else if (radio.checked) {
        label.style.color = "red";
      }
    });

    if (selected && parseInt(selected.value) === q.correct) {
      score++;
    }
  });

  scoreDisplay.textContent = `Score: ${score} / ${quizData[unit].length}`;
}; 

  content.appendChild(submitBtn);
  content.appendChild(scoreDisplay);

  unitDiv.appendChild(header);
  unitDiv.appendChild(content);
  container.appendChild(unitDiv);
});2</script>

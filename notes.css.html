<meta name='viewport' content='width=device-width, initial-scale=1'/><style>}/* General Page Styling */

body {
    font-family: Arial, Helvetica, sans-serif;
    line-height: 1.6;
    margin: 0;
    padding: 20px;
    background-color: #f5f7fb;
    color: #333;
}


/* Headings */

h1 {
    text-align: center;
    color: #2c3e50;
    margin-bottom: 10px;
}

h2 {
    color: #1a73e8;
    margin-top: 30px;
}

h3 {
    color: #34495e;
    margin-top: 20px;
}


/* Navigation */

ul {
    padding-left: 20px;
}

li {
    margin: 6px 0;
}


/* Links */

a {
    text-decoration: none;
    color: #1a73e8;
}

a:hover {
    text-decoration: underline;
}


/* Section Styling */

section {
    background: white;
    padding: 18px;
    margin-top: 15px;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}


/* Paragraph */

p {
    margin: 10px 0;
}


/* Button */

button {
    background-color: #1a73e8;
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 20px;
    font-size: 15px;
}

button:hover {
    background-color: #1558b0;
}


/* Quiz Box */

#quiz {
    background: #ffffff;
    border: 1px solid #ddd;
    padding: 18px;
    margin-top: 15px;
    border-radius: 8px;
}


/* MCQ Options */

#quiz ul {
    margin-bottom: 10px;
}

#quiz li {
    margin: 4px 0;
}


/* Answer Style */

strong {
    color: #0a7a30;
}


/* Mobile Responsive */

@media (max-width: 768px) {

    body {
        padding: 12px;
    }

    h1 {
        font-size: 24px;
    }

    h2 {
        font-size: 20px;
    }

}</style>
